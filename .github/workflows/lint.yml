name: lint checker
on: [workflow_dispatch]
jobs:
  run-lint:
      runs-on: ubuntu-latest
      steps:
        - name: get code
          uses: actions/checkout@v6
        - name: use node
          uses: actions/setup-node@v6
          with: 
            node-version: 22
        - name: install dependencies
          run: npm ci
        - name: run lint
          run: npm run lint
  run-tests:
      needs: run-lint
      runs-on: ubuntu-latest
      steps:
        - name: get code
          uses: actions/checkout@v6
        - name: use node
          uses: actions/setup-node@v6
          with: 
            node-version: 22
        - name: install dependencies
          run: npm ci
        - name: run tests
          run: npm run test -- --watch=false --browsers=ChromeHeadless
  run-build:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v6
      - name: use node
        uses: actions/setup-node@v6
        with: 
          node-version: 22
      - name: install dependencies
        run: npm ci
      - name: run build
        run: npm run build
      - name: deeploy app
        run: echo "deploying..."