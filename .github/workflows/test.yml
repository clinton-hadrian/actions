name: angular workflow
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v6
      - name: use node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: install dependencies
        run: npm ci
      - name: run tests
        run: npm test